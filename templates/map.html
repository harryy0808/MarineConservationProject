<!DOCTYPE html>
{% extends "base.html" %}
{% block title %}Map{% endblock %}
{% block body_content %}
    <!-- <img src="{{url_for('static', filename='images/Japan_map.svg')}}" class="object-fit-cover border rounded" style="height: 600px; width:875px;"> -->



    <div id="mapWrapper" class="position-relative text-center" style="text-align: center; position: relative;">
        <object id="mapObj" data="{{url_for('static', filename='images/Japan_map.svg')}}" type="image/svg+xml" style="width:38%;" class="center"></object>

        <div style="top:20px; left: 400px; popover-max-width: 400;" class="position-absolute">


            <button id="PopHokkaido" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Hokkaido Region</div>
                    <div class="card-body fs-6">
                        <p class='card-text'>Hokkaido focuses on the large-scale marine ecosystem conservation through protected coastal wetlands and national parks, such as Kushiro Wetlands, which are recognized for biodiversity and Ramsar protection.</p>
                    </div>
                </div>

            </button>

            <button id="PopTohoku" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Tohoku Region</div>
                    <div class="card-body">
                        <p class='card-text'>Tohoku's marine conservation efforts are connected to post-disaster recovery after the 2011 tsunami, with restoration of coastal ecosystems like seagrass beds and fisheries. These efforts aim to rebuild both biodiversity and sustainable local fishing industries.</p>
                    </div>
                </div>
            </button>

            <button id="PopKanto" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Kanto Region</div>
                    <div class="card-body">
                        <p class='card-text'>In the Kanto Region, conservation focuses on reducing marine pollution, especially in areas like Tokyo Bay where urban and plastic waste are major issues. Government policies emphasize waste reduction, caostal cleanup, and monitoring of marine ecosystems. </p>
                    </div>
                </div>
            </button>

            <button id="PopChubu" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Chubu Region</div>
                    <div class="card-body">
                        <p class='card-text'>Chubu region's marine conservation is connected to coastal national parks like Ise-Shima, where efforts balance tourism, fisheries, and ecosystem protection. The region also supports sustainable aquaculture practices to reduce environmental pressure on wild fish populations.</p>
                    </div>
                </div>
            </button>

            <button id="PopKansai" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Kansai Region</div>
                    <div class="card-body">
                        <p class='card-text'>Kansai focuses on protecting coastal biodiversity in areas such as the Seto Inland Sea, which has suffered from pollution and eutrophication. Conservation efforts include water quality improvement and habitat restoration to support marine life recovery.</p>
                    </div>
                </div>
            </button>

            <button id="PopChugoku" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Chugoku Region</div>
                    <div class="card-body">
                        <p class='card-text'>Chugoku region conservation focuses on managing coastal ecosystems along the Sea of Japan, including marine protected areas and fisheries population. Effort attempts to prevent overfishing while maintaining traditional fishing practices.</p>
                    </div>
                </div>
            </button>

            <button id="PopShikoku" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Shikoku Region</div>
                    <div class="card-body">
                        <p class='card-text'>Shikoku emphasizes the conservation of coral and coastal ecosystems, especially in areas like Ashizuri-Uwakai National Park. Local initiatives promote sustainable tourism and protection of marine biodiversity.</p>
                    </div>
                </div>
            </button>

            <button id="PopKyushu" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Kyushu Region</div>
                    <div class="card-body">
                        <p class='card-text'>Kyushu focuses on volcanic coastal ecosystems and rich marine biodiversity, with conservation programs in parks like Aso-Kuju and Kirishima-Kinokowan. Efforts for protecting fisheries, managing coastal habitats, and promoting renewable marine energy.</p>
                    </div>
                </div>
            </button>

            <button id="PopOkinawa" type="button" class="btn btn-lg btn-danger position-absolute" data-bs-toggle="popover" data-bs-title="" data-bs-placement="bottom" data-bs-content="" style="visibility: hidden; background-color:white; border:2px solid white; display: none;">
                <div class="card">
                    <div class="card-header bg-primary text-white">Okinawa Region</div>
                    <div class="card-body">
                        <p class='card-text'>Okinawa is a major region for coral reef conservation, with projects to restore reefs damaged by climate change and tourism. Local governments and communities actively protect marine biodiversity through marine parks and coral restoration initiatives.</p>
                    </div>
                </div>
            </button>

        </div>

    </div>

<script>

    function hideAllPopovers(){
        // ^ is startwith. Get all elements that start with "Pop"
        const popovers = document.querySelectorAll('[id^="Pop"]');

        // Hide each element
        popovers.forEach(pop => {
            pop.style.visibility = "hidden";
            pop.style.display = "none";
        });
    }

    const obj = document.getElementById("mapObj");
    console.log(obj)

    obj.addEventListener("load", () => {
        const svgDoc = obj.contentDocument;
        console.log("SVG loaded:", !!svgDoc);

    const groups = Array.from(svgDoc.querySelectorAll("g"));
    console.log("All groups:", groups.length);

    const regions = groups.filter(g => g.id);
    console.log("Regions found:", regions.map(r => r.id));
    console.log("All groups:", regions.length);

    regions.forEach(region => {
        region.style.cursor = "crosshair";
        console.log(region);


        region.addEventListener("click", (event) => {
            console.log("Clicked:", region.id);

            // call hide all popovers
            event.stopPropagation();
            hideAllPopovers();


            if (region.id){
                var pop = document.getElementById("Pop" + region.id);
                pop.style.visibility = "visible";
                pop.style.display = "block";
                pop.focus();
                pop.setAttribute('tabindex', '0');

            }
        });
    });



    });

</script>
{% endblock %}
